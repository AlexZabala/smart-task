<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTask | Gestión de Prioridades</title>

    <meta name="theme-color" content="#1e293b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SmartTask">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .task-done {
            text-decoration: line-through;
            opacity: 0.5;
            filter: grayscale(1);
        }

        .quadrant {
            min-height: 200px;
        }

        .header-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }

        /* Estilos de cuadrantes basados en la imagen */
        .q-card {
            border-radius: 20px;
            border-left-width: 8px;
            transition: all 0.3s ease;
        }

        .q-q1 {
            background: linear-gradient(135deg, #FFF0F0 0%, #FFF9F9 100%);
            border-left-color: #E63C3C;
        }

        .q-q2 {
            background: linear-gradient(135deg, #F0F5FF 0%, #F8FBFF 100%);
            border-left-color: #3C7CE6;
        }

        .q-q3 {
            background: linear-gradient(135deg, #FFFAF0 0%, #FFFEF9 100%);
            border-left-color: #E6A83C;
        }

        .q-q4 {
            background: linear-gradient(135deg, #E6EAF0 0%, #F0F3F7 100%);
            border-left-color: #6D7F9B;
        }

        .task-item {
            transition: all 0.2s ease;
            background-color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .task-item:hover {
            transform: translateY(-1px);
            background-color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .text-wrap-balance {
            word-break: break-word;
            overflow-wrap: break-word;
            white-space: normal;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 pb-20">

    <header class="header-gradient text-white pt-12 pb-20 px-4 shadow-lg mb-[-60px]">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight flex items-center gap-3">
                    <i class="fas fa-layer-group text-blue-400"></i>
                    SmartTask <span class="text-blue-400 font-light">Pro</span>
                </h1>
                <p class="text-slate-300 text-sm mt-1 uppercase tracking-widest font-semibold">Matriz de Productividad
                    Eisenhower</p>
            </div>
            <div class="text-left md:text-right">
                <p id="currentDate" class="text-lg font-medium opacity-90"></p>
                <p class="text-xs text-slate-400">Enfoque estratégico de tareas</p>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        <div class="bg-white p-5 rounded-2xl shadow-xl mb-10 border border-slate-200 relative z-10">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="taskInput" placeholder="Escribe un nuevo pendiente..."
                    class="md:col-span-2 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">

                <select id="prioritySelect"
                    class="p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none cursor-pointer font-medium text-slate-600 focus:ring-2 focus:ring-blue-500">
                    <option value="1">🔥 Hacer de inmediato</option>
                    <option value="2">📅 Planificar / Agenda</option>
                    <option value="3">🤝 Delegar / Terceros</option>
                    <option value="4">☕ Eliminar / Ocio</option>
                </select>

                <button onclick="addTask()"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all active:scale-95 shadow-lg shadow-blue-900/20">
                    <i class="fas fa-plus-circle mr-2"></i>Añadir Tarea
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="q-card q-q1 p-6 shadow-sm">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-8 h-8 rounded-lg bg-red-100 flex items-center justify-center text-red-600">
                        <i class="fas fa-bolt text-sm"></i>
                    </div>
                    <h2 class="font-bold tracking-tight uppercase text-xs" style="color: #E63C3C;">Hacer de inmediato
                    </h2>
                </div>
                <ul id="list-1" class="space-y-3 quadrant"></ul>
            </div>

            <div class="q-card q-q2 p-6 shadow-sm">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center text-blue-600">
                        <i class="fas fa-calendar text-sm"></i>
                    </div>
                    <h2 class="font-bold tracking-tight uppercase text-xs" style="color: #3C7CE6;">Planificar / Agenda
                    </h2>
                </div>
                <ul id="list-2" class="space-y-3 quadrant"></ul>
            </div>

            <div class="q-card q-q3 p-6 shadow-sm">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-8 h-8 rounded-lg bg-amber-100 flex items-center justify-center text-amber-600">
                        <i class="fas fa-users text-sm"></i>
                    </div>
                    <h2 class="font-bold tracking-tight uppercase text-xs" style="color: #E6A83C;">Delegar / Terceros
                    </h2>
                </div>
                <ul id="list-3" class="space-y-3 quadrant"></ul>
            </div>

            <div class="q-card q-q4 p-6 shadow-sm">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-8 h-8 rounded-lg bg-slate-200 flex items-center justify-center text-slate-600">
                        <i class="fas fa-coffee text-sm"></i>
                    </div>
                    <h2 class="font-bold tracking-tight uppercase text-xs" style="color: #6D7F9B;">Eliminar / Ocio</h2>
                </div>
                <ul id="list-4" class="space-y-3 quadrant"></ul>
            </div>
        </div>
    </main>

    <script>
        let tasks = JSON.parse(localStorage.getItem('smartAgendaPro')) || [];

        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('es-ES', options);

        function addTask() {
            const input = document.getElementById('taskInput');
            const priority = document.getElementById('prioritySelect').value;
            if (input.value.trim() === '') return;
            tasks.push({ id: Date.now(), text: input.value, priority: priority, completed: false });
            saveAndRender();
            input.value = '';
        }

        function toggleTask(id) {
            tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
            saveAndRender();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('smartAgendaPro', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            for (let i = 1; i <= 4; i++) document.getElementById(`list-${i}`).innerHTML = '';
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item flex items-start justify-between p-4 rounded-xl transition-all ${task.completed ? 'task-done' : 'shadow-sm'}`;

                li.innerHTML = `
                    <div class="flex items-start gap-4 cursor-pointer flex-1" onclick="toggleTask(${task.id})">
                        <i class="${task.completed ? 'fas fa-check-circle text-green-500' : 'far fa-circle text-slate-300'} text-lg mt-0.5"></i>
                        <span class="font-medium text-slate-700 text-wrap-balance ${task.completed ? 'task-done' : ''}">${task.text}</span>
                    </div>
                    <button onclick="deleteTask(${task.id})" class="text-slate-300 hover:text-red-500 transition-colors ml-4 shrink-0">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                document.getElementById(`list-${task.priority}`).appendChild(li);
            });
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `self.addEventListener('fetch', (e) => {});`;
                const blob = new Blob([swCode], { type: 'text/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(() => {
                    navigator.serviceWorker.register('./sw.js').catch(() => { });
                });
            });
        }
        renderTasks();
    </script>
</body>

</html>
