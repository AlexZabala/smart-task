<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTask - Agenda Inteligente Pro</title>

    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SmartTask">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/552/552402.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .task-done {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .quadrant {
            min-height: 180px;
        }

        @keyframes pulse-red {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
                background-color: #fee2e2;
            }

            100% {
                transform: scale(1);
            }
        }

        .alarm-active {
            animation: pulse-red 1s infinite;
            border: 2px solid #ef4444 !important;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans pb-20">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-slate-900 mb-2 tracking-tight italic">Smart<span
                    class="text-blue-600">Task</span></h1>
            <p id="clock" class="text-3xl font-mono text-slate-600 font-bold tracking-widest">00:00:00</p>
            <p id="notifStatus" class="text-xs mt-2 text-slate-400">Cargando permisos de notificación...</p>
        </header>

        <div class="bg-white p-6 rounded-3xl shadow-xl mb-10 border border-slate-200">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <input type="text" id="taskInput" placeholder="¿Qué tarea tienes pendiente?"
                    class="md:col-span-2 p-3 bg-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">

                <input type="time" id="timeInput"
                    class="p-3 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">

                <select id="prioritySelect" class="p-3 bg-slate-100 rounded-xl outline-none cursor-pointer">
                    <option value="1">🔥 Urgente e Imp.</option>
                    <option value="2">📅 Importante</option>
                    <option value="3">🤝 Urgente (Delegar)</option>
                    <option value="4">☕ Baja Prioridad</option>
                </select>

                <button onclick="addTask()"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all active:scale-95 shadow-lg shadow-blue-200">
                    <i class="fas fa-bell mr-2"></i>Agendar
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-red-50 border-l-8 border-red-500 p-5 rounded-2xl shadow-sm">
                <h2 class="font-black text-red-600 mb-4 text-xs uppercase tracking-widest">Hacer de inmediato</h2>
                <ul id="list-1" class="space-y-3 quadrant"></ul>
            </div>
            <div class="bg-blue-50 border-l-8 border-blue-500 p-5 rounded-2xl shadow-sm">
                <h2 class="font-black text-blue-600 mb-4 text-xs uppercase tracking-widest">Planificar / Agenda</h2>
                <ul id="list-2" class="space-y-3 quadrant"></ul>
            </div>
            <div class="bg-amber-50 border-l-8 border-amber-500 p-5 rounded-2xl shadow-sm">
                <h2 class="font-black text-amber-600 mb-4 text-xs uppercase tracking-widest">Delegar / Interrupciones
                </h2>
                <ul id="list-3" class="space-y-3 quadrant"></ul>
            </div>
            <div class="bg-slate-200 border-l-8 border-slate-500 p-5 rounded-2xl shadow-sm">
                <h2 class="font-black text-slate-600 mb-4 text-xs uppercase tracking-widest">Eliminar / Ocio</h2>
                <ul id="list-4" class="space-y-3 quadrant"></ul>
            </div>
        </div>
    </div>

    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"
        preload="auto"></audio>

    <script>
        let tasks = JSON.parse(localStorage.getItem('smartAgendaPro')) || [];

        // 1. GESTIÓN DE PERMISOS DE NOTIFICACIÓN
        async function requestNotificationPermission() {
            if (!("Notification" in window)) {
                document.getElementById('notifStatus').innerText = "Tu navegador no soporta notificaciones.";
                return;
            }

            if (Notification.permission !== "granted") {
                const permission = await Notification.requestPermission();
                updateNotifStatus(permission);
            } else {
                updateNotifStatus("granted");
            }
        }

        function updateNotifStatus(permission) {
            const statusEl = document.getElementById('notifStatus');
            if (permission === "granted") {
                statusEl.innerText = "✅ Notificaciones activadas";
                statusEl.classList.replace('text-slate-400', 'text-green-600');
            } else {
                statusEl.innerText = "❌ Notificaciones bloqueadas o desactivadas.";
                statusEl.classList.replace('text-slate-400', 'text-red-500');
            }
        }

        // 2. RELOJ Y CHEQUEO DE ALARMAS
        setInterval(() => {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const currentTime = `${hours}:${minutes}`;

            document.getElementById('clock').innerText = now.toLocaleTimeString();

            tasks.forEach(task => {
                if (task.time === currentTime && !task.completed && !task.alarmFired) {
                    triggerAlarm(task);
                }
            });
        }, 1000);

        function triggerAlarm(task) {
            task.alarmFired = true;
            document.getElementById('alarmSound').play().catch(() => { });

            if (Notification.permission === "granted") {
                new Notification("⏰ ¡Tarea Pendiente!", {
                    body: task.text,
                    icon: "https://cdn-icons-png.flaticon.com/512/552/552402.png"
                });
            }

            alert(`RECORDATORIO: ${task.text}`);
            saveAndRender();
        }

        // 3. LÓGICA DE TAREAS
        function addTask() {
            const input = document.getElementById('taskInput');
            const time = document.getElementById('timeInput').value;
            const priority = document.getElementById('prioritySelect').value;

            if (input.value.trim() === '') return;

            tasks.push({
                id: Date.now(),
                text: input.value,
                time: time,
                priority: priority,
                completed: false,
                alarmFired: false
            });

            saveAndRender();
            input.value = '';
            document.getElementById('timeInput').value = '';
        }

        function toggleTask(id) {
            tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed, alarmFired: t.completed ? false : t.alarmFired } : t);
            saveAndRender();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('smartAgendaPro', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            for (let i = 1; i <= 4; i++) document.getElementById(`list-${i}`).innerHTML = '';

            tasks.forEach(task => {
                const li = document.createElement('li');
                const isActiveAlarm = task.alarmFired && !task.completed;

                li.className = `flex flex-col p-3 rounded-xl shadow-sm border transition-all ${task.completed ? 'bg-white/40' : 'bg-white'} ${isActiveAlarm ? 'alarm-active' : 'border-transparent'}`;

                li.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3 cursor-pointer overflow-hidden flex-1" onclick="toggleTask(${task.id})">
                            <i class="${task.completed ? 'fas fa-check-circle text-green-500' : 'far fa-circle text-slate-300'} text-lg"></i>
                            <span class="font-medium truncate ${task.completed ? 'task-done' : ''}">${task.text}</span>
                        </div>
                        <button onclick="deleteTask(${task.id})" class="text-slate-300 hover:text-red-500 p-1">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    ${task.time ? `
                    <div class="mt-1 ml-8 text-[10px] font-bold uppercase tracking-wider ${isActiveAlarm ? 'text-red-600' : 'text-slate-400'}">
                        <i class="far fa-clock mr-1"></i> Alarma: ${task.time}
                    </div>` : ''}
                `;
                document.getElementById(`list-${task.priority}`).appendChild(li);
            });
        }

        // Iniciar
        requestNotificationPermission();
        renderTasks();
    </script>
</body>

</html>
